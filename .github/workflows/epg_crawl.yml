name: Crawl playback.xml (Python)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        name: 拉取代码
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬取
        run: python epg_crawl.py

      - name: 提交更新（仅变化时提交）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playback.xml

          if git diff --cached --quiet; then
            echo "✅ 无变化，跳过提交"
            exit 0
          fi

          git commit -m "Auto update playback.xml"
          git push
