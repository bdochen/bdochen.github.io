name: epg_crawl

on:
  schedule:
    - cron: '0 18,6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 
        run: |
          NODES=(
          "101.65.31.162:1234"
          "106.4.95.173:1234"
          "106.54.8.114:88"
          "111.76.16.76:1234"
          "111.76.17.141:1234"
          "120.202.231.86:1234"
          "120.48.113.49:6006"
          "123.14.2.150:1234"
          "171.213.133.77:1234"
          "180.137.128.166:1234"
          "182.61.15.163:80"
          "182.85.163.168:5678"
          "219.156.66.138:1234"
          "221.9.41.169:1234"
          "222.129.110.101:3566"
          "223.167.209.88:1234"
          "223.247.25.236:1234"
          "27.202.232.222:1234"
          "27.214.84.188:1234"
          "39.72.0.205:1234"
          "42.193.195.163:3000"
          "47.102.212.49:1234"
          "58.212.119.102:307"
          "59.175.11.109:1234"
          "60.183.60.22:1234"
          "60.205.207.126:1234"
          "8.129.31.234:13336"
          "82.156.245.233:30008"
          )
          API_PATH="/playback.xml"
          USE_NODE=""
          for addr in "${NODES[@]}";do
            echo "测试节点：$addr"
            if curl -s --connect-timeout 5 "http://${addr}${API_PATH}" -o play.xml;then
              USE_NODE=$addr
              echo "✅ 成功抓取：$USE_NODE"
              ls -lh play.xml
              break
            fi
            echo "❌ 节点失效，换下一个"
            rm -f play.xml
          done
          if [ -z "$USE_NODE" ];then
            echo "所有节点全部失效"
            exit 1
          fi
      
      - name: 提交更新文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add play.xml
          git diff --staged --quiet || git commit -m "update epg $(date '+%Y-%m-%d %H:%M:%S')"
          git push
