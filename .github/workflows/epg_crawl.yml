name: epg_crawl

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 抓取并保存为play.xml
        run: |
          curl -s "http://61.188.32.196:3000/playback.xml" > play.xml
          echo "抓取完成，文件大小："
          ls -lh play.xml
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add play.xml
          git diff --staged --quiet || git commit -m "update $(date '+%Y-%m-%d %H:%M:%S')"
          git push
