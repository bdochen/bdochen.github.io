name: iku 每日签到

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '6 5 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    # 防止多个 workflow 同时运行
    concurrency:
      group: ikuuu-checkin
      cancel-in-progress: false
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 执行签到
        env:
          COOKIE_LIST: ${{ secrets.COOKIE_LIST }}
          QYWX_BOT_KEY: ${{ secrets.QYWX_BOT_KEY }}
        run: |
          python vpn_check_github.py
      
      - name: 保存日志（可选）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-log
          path: |
            *.log
          retention-days: 7
