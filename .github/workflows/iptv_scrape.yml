name: 定期抓取IPTV

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 抓取并保存为iptv.bin
        run: |
          curl -s "http://47.94.35.147:26228/" > iptv.bin
          echo "抓取完成，文件大小："
          ls -lh iptv.bin
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iptv.bin
          git diff --staged --quiet || git commit -m "自动抓取更新 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
