name: iptv_scrape

on:
  schedule:
    - cron: '0 22,10 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 抓取并保存为iptv.bin
        run: |
          # 定义变量
          MAIN_HOST="117.63.79.133:1234"
          BACKUP_HOST="www.jqhome.top:1234"
          CHECK_URL="http://${MAIN_HOST}/608807420"
          MAIN_URL="http://${MAIN_HOST}/"
          BACKUP_URL="http://${BACKUP_HOST}/"

          if curl -s --connect-timeout 5 --max-time 8 "$CHECK_URL" >/dev/null; then
            curl -s "$MAIN_URL" > iptv.bin
          else
            curl -s "$BACKUP_URL" > iptv.bin
          fi
          echo "抓取完成，文件大小："
          ls -lh iptv.bin
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iptv.bin
          git diff --staged --quiet || git commit -m "update $(date '+%Y-%m-%d %H:%M:%S')"
          git push
