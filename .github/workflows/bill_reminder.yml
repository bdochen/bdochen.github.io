name: 还款提醒

on:
  schedule:
    # 北京时间 06:00
    - cron: "0 22 * * *"
    # 北京时间 12:00
    - cron: "0 4 * * *"
    # 北京时间 21:00
    - cron: "0 13 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      QYWX_BOT_KEY: ${{ secrets.QYWX_BOT_KEY }}
      DISABLE_PUSH: "false"
      REMINDER_CONFIG: ${{ secrets.REMINDER_CONFIG }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run reminder
        run: python bill_notice.py
