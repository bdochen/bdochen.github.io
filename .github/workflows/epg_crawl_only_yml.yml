name: epg_crawl_only_yml

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 抓取并保存为epg.bin
        run: |
          curl -s "http://47.110.243.216:51234/playback.xml" > epg.bin
          echo "抓取完成，文件大小："
          ls -lh epg.bin
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.bin
          git diff --staged --quiet || git commit -m "自动抓取更新 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
