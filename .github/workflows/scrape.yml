name: 每6小时抓取

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 抓取并保存为index.html
        run: |
          curl -s "http://47.110.243.216:51234/" > iptv.html
          echo "抓取完成，文件大小："
          ls -lh iptv.html
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "自动抓取更新 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
